<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA MD - V1 FINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root { --blue: #00f2ff; --purple: #9d00ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; color: #fff; }

        /* 1. INTRO - හරියටම මැදට */
        #intro-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .intro-logo {
            width: 140px; height: 140px; border-radius: 50%;
            border: 3px solid var(--blue); box-shadow: 0 0 30px var(--blue);
            animation: pulse 2s infinite; margin-bottom: 20px;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .intro-text { font-size: 26px; letter-spacing: 10px; text-shadow: 0 0 15px var(--blue); font-weight: 900; }

        /* Background Matrix */
        #matrix-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.3; }

        /* Main UI - පස්සේ පේන්න හදන්නේ */
        #main-container {
            display: none; flex-direction: column; align-items: center; 
            width: 100%; opacity: 0; transition: opacity 1s ease;
        }

        /* NEON CARD */
        .neon-box {
            position: relative; width: min(90%, 360px); padding: 3px;
            background: linear-gradient(45deg, var(--blue), var(--purple));
            border-radius: 30px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }
        .glass-card {
            background: #0a0a0a; border-radius: 27px; padding: 30px 20px; text-align: center;
        }
        .card-logo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--blue); margin-bottom: 15px; }

        /* Inputs */
        .input-box {
            width: 100%; padding: 14px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 12px; color: #fff; text-align: center; margin-bottom: 15px; outline: none;
        }
        .get-btn {
            width: 100%; padding: 14px; background: var(--blue); border: none;
            border-radius: 12px; font-weight: 900; cursor: pointer; color: #000;
        }
        #pair-result { margin-top: 15px; font-size: 24px; font-weight: 900; color: var(--blue); letter-spacing: 5px; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <img src="https://files.catbox.moe/317h3c.png" class="intro-logo">
        <div class="intro-text">AURA MD</div>
    </div>

    <canvas id="matrix-canvas"></canvas>

    <div id="main-container">
        <h2 style="margin-bottom:20px; letter-spacing:5px; text-shadow:0 0 10px var(--blue);">AURA MD</h2>
        <div class="neon-box">
            <div class="glass-card">
                <img src="https://files.catbox.moe/317h3c.png" class="card-logo">
                <p style="font-size:10px; color:var(--blue); margin-bottom:15px;">V1 PAIRING INTERFACE</p>
                <input type="number" id="number" class="input-box" placeholder="947xxxxxxxx">
                <button class="get-btn" id="submitBtn">GET CODE</button>
                <div id="pair-result"></div>
            </div>
        </div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let drops = [];
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drops = Array(Math.floor(canvas.width/20)).fill(1); }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.font = "15px monospace"; ctx.fillStyle = "#00f2ff";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(0x30A0 + Math.random()*96), i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        init(); setInterval(draw, 50);

        // Intro Transition - Render වලට 100% වැඩ කරන විදිහට
        window.onload = () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                const main = document.getElementById('main-container');
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    main.style.display = 'flex';
                    setTimeout(() => { main.style.opacity = '1'; }, 50);
                }, 1000);
            }, 5000);
        };

        // GET CODE LOGIC
        document.getElementById("submitBtn").addEventListener("click", async () => {
            const num = document.getElementById("number").value;
            const res = document.getElementById("pair-result");
            if(!num) { res.innerHTML = "ENTER NUMBER!"; return; }
            res.innerHTML = "WAIT...";
            
            try {
                const response = await fetch(`/code?number=${num}`);
                const data = await response.json();
                res.innerHTML = data.code || "ERROR!";
            } catch(e) { res.innerHTML = "SERVER ERROR!"; }
        });
    </script>
</body>
</html>
